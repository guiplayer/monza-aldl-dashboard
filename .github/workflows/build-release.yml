name: Compilar firmware

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ESP32 firmware
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Configurar pacote ESP32
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Instalar bibliotecas
        run: |
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit ST7735 and ST7789 Library"
          arduino-cli lib install "Adafruit BME280 Library"
          arduino-cli lib install "Adafruit Unified Sensor"
          arduino-cli lib install "RTClib"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "AnimatedGIF"
          arduino-cli lib install "MPU6050"

      - name: Compilar firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir build \
            sketch/monza-aldl-dashboard

      - name: Renomear firmware
        run: |
          cp build/monza-aldl-dashboard.ino.bin monza-aldl-dashboard-${{ github.ref_name }}.bin

      - name: Publicar artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: monza-aldl-dashboard-${{ github.ref_name }}.bin

      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: monza-aldl-dashboard-${{ github.ref_name }}.bin